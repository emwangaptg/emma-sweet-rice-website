name: Update site data

on:
  schedule:
    - cron: "10 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update MyShip and Instagram data
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: node tools/update-site-data.mjs

      - name: Commit changed site data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update site product and Instagram data"
